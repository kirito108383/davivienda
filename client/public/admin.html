<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Monitoreo - Davivienda</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      background-color: #f5f5f5;
    }
    .header {
      background-color: #D50000;
      color: white;
      padding: 15px;
      text-align: center;
      border-radius: 5px;
      margin-bottom: 20px;
    }
    .notification-container {
      border: 1px solid #ddd;
      border-radius: 5px;
      padding: 20px;
      background-color: white;
      max-height: 600px;
      overflow-y: auto;
    }
    .notification {
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 5px;
    }
    .notification.login {
      background-color: #e3f2fd;
      border-left: 5px solid #2196F3;
    }
    .notification.logout {
      background-color: #ffebee;
      border-left: 5px solid #f44336;
    }
    .notification.register {
      background-color: #e8f5e9;
      border-left: 5px solid #4CAF50;
    }
    .notification-time {
      font-size: 0.8em;
      color: #666;
      margin-bottom: 5px;
    }
    .notification-message {
      font-size: 1.1em;
    }
    .button-container {
      margin-top: 20px;
      text-align: center;
    }
    .clear-button {
      background-color: #D50000;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1em;
    }
    .clear-button:hover {
      background-color: #b71c1c;
    }
    .connection-status {
      text-align: center;
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 5px;
    }
    .connected {
      background-color: #e8f5e9;
      color: #2e7d32;
    }
    .disconnected {
      background-color: #ffebee;
      color: #c62828;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Panel de Monitoreo de Usuarios</h1>
    <p>Davivienda - Sistema de Notificaciones en Tiempo Real</p>
  </div>

  <div id="connection-status" class="connection-status disconnected">
    Desconectado
  </div>

  <div class="notification-container" id="notifications">
    <p id="no-notifications">No hay notificaciones todavía.</p>
  </div>

  <div class="button-container">
    <button class="clear-button" id="clearBtn">Limpiar Notificaciones</button>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const notificationsContainer = document.getElementById('notifications');
      const noNotifications = document.getElementById('no-notifications');
      const clearBtn = document.getElementById('clearBtn');
      const connectionStatus = document.getElementById('connection-status');
      
      // Configurar WebSocket
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${protocol}//${window.location.host}/ws`;
      let socket;
      let reconnectAttempts = 0;
      let reconnectInterval;
      
      function connectWebSocket() {
        socket = new WebSocket(wsUrl);
        
        socket.onopen = function() {
          console.log('Conexión WebSocket establecida');
          connectionStatus.textContent = 'Conectado';
          connectionStatus.classList.remove('disconnected');
          connectionStatus.classList.add('connected');
          reconnectAttempts = 0;
          clearInterval(reconnectInterval);
        };
        
        socket.onmessage = function(event) {
          try {
            const data = JSON.parse(event.data);
            if (data.type === 'admin_notification') {
              addNotification(data.message);
            }
          } catch (error) {
            console.error('Error al procesar el mensaje:', error);
          }
        };
        
        socket.onclose = function() {
          console.log('Conexión WebSocket cerrada');
          connectionStatus.textContent = 'Desconectado - Intentando reconectar...';
          connectionStatus.classList.remove('connected');
          connectionStatus.classList.add('disconnected');
          
          // Intentar reconectar
          reconnectAttempts++;
          if (!reconnectInterval) {
            reconnectInterval = setInterval(() => {
              if (reconnectAttempts < 10) {
                console.log(`Intento de reconexión ${reconnectAttempts}...`);
                connectWebSocket();
              } else {
                clearInterval(reconnectInterval);
                reconnectInterval = null;
                connectionStatus.textContent = 'Desconectado - Falló la reconexión. Recargue la página.';
              }
            }, 5000);
          }
        };
        
        socket.onerror = function(error) {
          console.error('Error en la conexión WebSocket:', error);
        };
      }
      
      // Iniciar conexión WebSocket
      connectWebSocket();
      
      function addNotification(message) {
        if (noNotifications) {
          noNotifications.style.display = 'none';
        }
        
        const now = new Date();
        const timeStr = now.toLocaleTimeString();
        
        const notificationDiv = document.createElement('div');
        notificationDiv.className = 'notification';
        
        // Determinar el tipo de notificación
        if (message.includes('[LOGIN]')) {
          notificationDiv.classList.add('login');
        } else if (message.includes('[LOGOUT]')) {
          notificationDiv.classList.add('logout');
        } else if (message.includes('[REGISTRO]')) {
          notificationDiv.classList.add('register');
        }
        
        const timeDiv = document.createElement('div');
        timeDiv.className = 'notification-time';
        timeDiv.textContent = timeStr;
        
        const messageDiv = document.createElement('div');
        messageDiv.className = 'notification-message';
        messageDiv.textContent = message;
        
        notificationDiv.appendChild(timeDiv);
        notificationDiv.appendChild(messageDiv);
        
        notificationsContainer.prepend(notificationDiv);
      }
      
      // Botón para limpiar notificaciones
      clearBtn.addEventListener('click', function() {
        notificationsContainer.innerHTML = '';
        const noNotificationsP = document.createElement('p');
        noNotificationsP.id = 'no-notifications';
        noNotificationsP.textContent = 'No hay notificaciones todavía.';
        notificationsContainer.appendChild(noNotificationsP);
      });
    });
  </script>
</body>
</html>
